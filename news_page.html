<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ news[1] }}</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .wrap { max-width: 800px; margin: auto; }
        .back { color: #ffeb3b; text-decoration: none; font-weight: bold; }
        img { width: 100%; border-radius: 12px; margin: 20px 0; }
        
        /* Mənbə düyməsi üçün stil */
        .source-box { 
            margin-top: 25px; 
            padding: 15px; 
            background: #161b22; 
            border-left: 4px solid #ffeb3b; 
            border-radius: 8px;
        }
        .source-link { 
            color: #ffeb3b; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block;
        }
        .source-link:hover { text-decoration: underline; }

        .comm-box { background: #1c2128; padding: 20px; border-radius: 12px; margin-top: 40px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e14; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        button { background: #ffeb3b; border: none; padding: 12px 25px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; }
        .comm { border-bottom: 1px solid #30363d; padding: 10px 0; }
    </style>
</head>
<body>
   <div class="wrap">
    <a href="/" class="back">← Ana Səhifə</a>
    <h1 style="color: #ffeb3b;">{{ news[1] }}</h1>
    <img src="{{ news[4] or 'https://via.placeholder.com/800x400' }}">
    
    <div style="font-size: 18px; color: #eee; margin-top: 20px; white-space: pre-line;">
        {{ news[3] if news[3] else "Bu xəbər üçün ətraflı məlumat hələ əlavə edilməyib." }}
    </div>

    <div class="source-box">
        <a href="{{ news[2] }}" target="_blank" class="source-link">Orijinal mənbəyə keçid (Milli.az / Trend.az)</a>
    </div>
    
    </div>
        
        <div class="comm-box">
            <h3>Şərhlər</h3>
            {% for s in serhler %}
            <div class="comm">
                <b style="color: #ffeb3b;">{{ s[0] }}:</b> <span>{{ s[1] }}</span>
            </div>
            {% endfor %}

            <h4 style="margin-top: 20px;">Şərhinizi yazın</h4>
            <form action="/send_serh" method="POST">
                <input type="hidden" name="xeber_id" value="{{ news[0] }}">
                <input type="text" name="ad" placeholder="Adınız" required>
                <textarea name="mesaj" placeholder="Mesajınız..." rows="4" required></textarea>
                <button type="submit">Şərhi Göndər</button>
            </form>
        </div>
    </div>
</body>
</html>
