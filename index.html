<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKU NEWS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #0b0e14; color: white; padding-bottom: 80px; }
        
        /* HEADER DÜZƏLİŞİ */
        header { 
            background: #161b22; 
            padding: 15px 20px; 
            display: grid; /* Grid istifadə edirik ki, loqo tam mərkəzdə olsun */
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            border-bottom: 2px solid #ffeb3b; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        
        .logo { 
            grid-column: 2; /* Loqo hər zaman orta sütunda olur */
            font-size: 26px; 
            font-weight: bold; 
            color: #ffeb3b; 
            text-decoration: none; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .left-menu { display: flex; align-items: center; gap: 15px; }

        #searchBar { display: none; position: fixed; top: 0; width: 100%; background: #161b22; padding: 15px; z-index: 1500; border-bottom: 1px solid #ffeb3b; text-align: center; }
        #searchBar input { width: 70%; padding: 10px; border-radius: 5px; border: none; }

        .container { max-width: 1300px; margin: auto; padding: 15px; }

        .news-grid { display: grid; gap: 20px; margin-top: 20px; }

        @media (min-width: 1025px) { .news-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1024px) and (min-width: 601px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }

        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; }
            .img-box { height: 230px !important; }
            .logo { font-size: 20px; }
        }

        .news-card { background: #1c2128; border-radius: 12px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #30363d; transition: 0.3s; display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-5px); border-color: #ffeb3b; }

        .img-box { position: relative; width: 100%; height: 160px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .cat-badge { position: absolute; top: 10px; left: 10px; background: rgba(255, 235, 59, 0.9); color: black; font-size: 10px; font-weight: bold; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; }

        .card-info { padding: 12px; }
        .card-info h3 { font-size: 15px; margin: 0; line-height: 1.4; color: #eee; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; height: 42px; }

        footer { position: fixed; bottom: 0; width: 100%; background: #161b22; padding: 12px; border-top: 1px solid #30363d; text-align: center; color: #ffeb3b; z-index: 1000; display: flex; justify-content: center; gap: 25px; font-size: 14px; }
        
        .admin-link { background: red; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="searchBar">
    <form action="/" method="GET">
        <input type="text" name="q" placeholder="Xəbər axtar...">
        <button type="submit" style="padding:10px; background:#ffeb3b; border:none; border-radius:5px; cursor:pointer;"><i class="fa fa-search"></i></button>
        <button type="button" onclick="toggleSearch()" style="background:none; color:white; border:none; font-size:25px; cursor:pointer;">&times;</button>
    </form>
</div>

<header>
    <div class="left-menu">
        <i class="fa fa-search" onclick="toggleSearch()" style="color:#ffeb3b; cursor:pointer; font-size:20px;"></i>
        {% if info.is_admin %}
            <a href="/admin?key=1eldar123*" class="admin-link">ADMİN</a>
        {% endif %}
    </div>
    
    <a href="/" class="logo">BAKU NEWS</a>
    
    <div></div> </header>

<div class="container">
    {% if all_news %}
        <div class="news-grid">
            {% for item in all_news %}
            <a href="/xeber/{{ item[0] }}" class="news-card">
                <div class="img-box">
                    <img src="{{ item[4] or 'https://via.placeholder.com/400x250?text=BAKU+NEWS' }}" alt="news">
                    <span class="cat-badge">{{ item[5] }}</span>
                </div>
                <div class="card-info">
                    <h3>{{ item[1] }}</h3>
                </div>
            </a>
            {% endfor %}
        </div>
    {% else: %}
        <div style="text-align:center; padding: 100px 20px;">
            <i class="fa fa-newspaper" style="font-size: 50px; color: #30363d; margin-bottom: 20px;"></i>
            <p style="color:#888;">Hələlik xəbər yoxdur. Bot xəbərləri axtarır, bir neçə dəqiqəyə yeniləyin.</p>
        </div>
    {% endif %}
</div>

<footer>
    <div><i class="fa fa-money-bill-wave"></i> USD: 1.7000</div>
    <div><i class="fa fa-temperature-high"></i> {{ info.hava }}</div>
</footer>

<script>
    function toggleSearch() { 
        var s = document.getElementById('searchBar');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
