<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKU NEWS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #0b0e14; color: white; padding-bottom: 80px; }
        header { background: #161b22; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffeb3b; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: #ffeb3b; text-decoration: none; letter-spacing: 1px; }
        
        /* DİL SEÇİMİ */
        .lang-switcher { display: flex; gap: 8px; font-size: 14px; font-weight: bold; }
        .lang-switcher a { text-decoration: none; color: #888; transition: 0.3s; }
        .lang-switcher a.active { color: #ffeb3b; }
        .lang-switcher span { color: #444; }

        #searchBar { display: none; position: fixed; top: 0; width: 100%; background: #161b22; padding: 15px; z-index: 1500; border-bottom: 1px solid #ffeb3b; text-align: center; }
        #searchBar input { width: 70%; padding: 10px; border-radius: 5px; border: none; }

        .container { max-width: 1300px; margin: auto; padding: 15px; }

        /* QRİD SİSTEMİ - KOMPÜTERDƏ 4-LÜ */
        .news-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        @media (min-width: 1025px) {
            .news-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 1024px) and (min-width: 601px) {
            .news-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* TELEFONDA 1-Lİ VƏ BÖYÜK ŞƏKİL */
        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; }
            .img-box { height: 230px !important; } /* Telefonda şəkil daha dolğun görünsün */
            .container { padding: 10px; }
        }

        /* KART DİZAYNI */
        .news-card {
            background: #1c2128;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            border: 1px solid #30363d;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover { transform: translateY(-5px); border-color: #ffeb3b; }

        .img-box { position: relative; width: 100%; height: 160px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .cat-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 235, 59, 0.9);
            color: black;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 7px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .card-info { padding: 12px; }
        .card-info h3 {
            font-size: 15px;
            margin: 0;
            line-height: 1.4;
            color: #eee;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            height: 42px;
        }

        footer { position: fixed; bottom: 0; width: 100%; background: #161b22; padding: 12px; border-top: 1px solid #30363d; text-align: center; color: #ffeb3b; z-index: 1000; display: flex; justify-content: center; gap: 25px; font-size: 14px; }
        
        {% if info.is_admin %}
        .admin-link { background: red; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; text-decoration: none; }
        {% endif %}
    </style>
</head>
<body>

<div id="searchBar">
    <form action="/" method="GET">
        <input type="text" name="q" placeholder="Xəbər axtar...">
        <button type="submit" style="padding:10px; background:#ffeb3b; border:none; border-radius:5px; cursor:pointer;"><i class="fa fa-search"></i></button>
        <button type="button" onclick="toggleSearch()" style="background:none; color:white; border:none; font-size:25px; cursor:pointer;">&times;</button>
    </form>
</div>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <i class="fa fa-search" onclick="toggleSearch()" style="color:#ffeb3b; cursor:pointer; font-size:20px;"></i>
        {% if info.is_admin %}
            <a href="/admin?key=1eldar123*" class="admin-link">ADMİN</a>
        {% endif %}
    </div>
    
    <a href="/" class="logo">BAKU NEWS</a>

    <div class="lang-switcher">
        <a href="/set_lang/az" class="{% if info.lang == 'az' %}active{% endif %}">AZ</a>
        <span>|</span>
        <a href="/set_lang/ru" class="{% if info.lang == 'ru' %}active{% endif %}">RU</a>
        <span>|</span>
        <a href="/set_lang/en" class="{% if info.lang == 'en' %}active{% endif %}">EN</a>
    </div>
</header>

<div class="container">
    {% if info.query %}
        <h3 style="color: #ffeb3b; font-size: 16px;">"{{ info.query }}" üzrə nəticələr:</h3>
    {% endif %}

    <div class="news-grid">
        {% if all_news %}
            {% for item in all_news %}
            <a href="/xeber/{{ item[0] }}" class="news-card">
                <div class="img-box">
                    <img src="{{ item[4] or 'https://via.placeholder.com/400x250?text=BAKU+NEWS' }}" alt="news">
                    <span class="cat-badge">{{ item[5] }}</span>
                </div>
                <div class="card-info">
                    <h3>{{ item[1] }}</h3>
                </div>
            </a>
            {% endfor %}
        {% else %}
            <p style="text-align:center; color:#888; grid-column: span 12;">Xəbər tapılmadı.</p>
        {% endif %}
    </div>
</div>

<footer>
    <div><i class="fa fa-money-bill-wave"></i> USD: 1.7000</div>
    <div><i class="fa fa-temperature-high"></i> {{ info.hava }}</div>
</footer>

<script>
    function toggleSearch() { 
        var s = document.getElementById('searchBar');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
