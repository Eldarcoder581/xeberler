<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKU NEWS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #0b0e14; color: white; }
        header { background: #161b22; padding: 15px; text-align: center; border-bottom: 2px solid #ffeb3b; }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        
        /* Slider */
        .swiper { width: 100%; border-radius: 15px; margin-bottom: 30px; }
        @media (max-width: 768px) { .swiper { height: 250px; } }
        @media (min-width: 769px) { .swiper { height: 500px; } }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .caption { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, black); width: 100%; font-size: 20px; }
        
        /* Siyahı */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1c2128; border-radius: 10px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #30363d; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 10px; }
        .card h3 { font-size: 14px; margin: 0; height: 40px; overflow: hidden; }
        
        .swiper-button-next, .swiper-button-prev { color: #ffeb3b !important; }
    </style>
</head>
<body>
    <header><h1>BAKU NEWS</h1></header>
    <div class="container">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                {% for item in slider_news %}
                <div class="swiper-slide">
                    <a href="/xeber/{{ item[0] }}">
                        <img src="{{ item[2] or 'https://via.placeholder.com/800x400' }}">
                        <div class="caption">{{ item[1] }}</div>
                    </a>
                </div>
                {% endfor %}
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>

        <h2>İndi oxuyurlar</h2>
        <div class="grid">
            {% for item in all_news %}
            <a href="/xeber/{{ item[0] }}" class="card">
                <img src="{{ item[3] or 'https://via.placeholder.com/400x200' }}">
                <div class="card-body">
                    <h3>{{ item[1] }}</h3>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        new Swiper(".mySwiper", { loop: true, navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" }, autoplay: { delay: 3000 } });
    </script>
</body>
</html>
